<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Finance Dashboard</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="styles.css?v=20260516-10">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Investment Learning Pool</p>
        <h1>Finance Dashboard</h1>
      </div>
      <div class="status">
        <span id="updatedAt">Loading</span>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
    </header>

    <main>
      <nav class="primary-tabs" aria-label="Main views">
        <button class="primary-tab active" data-view="stocks" type="button">股票对比</button>
        <button class="primary-tab" data-view="experts" type="button">专家足迹</button>
      </nav>

      <section id="stocksView" class="view active">
        <div class="stock-workbench">
          <aside class="stock-list-panel">
            <div class="section-head compact">
              <p class="eyebrow">Perspective</p>
              <h2>视角排序</h2>
            </div>
            <div class="perspective-tabs" id="perspectiveTabs"></div>
            <div id="perspectiveHelp" class="perspective-help"></div>
            <div id="stockList" class="stock-list"></div>
          </aside>

          <section class="stock-detail-panel">
            <div class="detail-top">
              <div>
                <p class="eyebrow" id="selectedType">Stock</p>
                <h2 id="selectedSymbol">Select</h2>
                <p id="selectedTheme">选择左侧标的查看详情。</p>
              </div>
              <div class="detail-badges">
                <span id="selectedPrice">n/a</span>
                <span id="selectedDay">n/a</span>
                <span id="selectedScore">n/a</span>
              </div>
            </div>

            <div class="chart-card">
              <div class="chart-head">
                <h3>价格曲线</h3>
                <div class="range-tabs" id="rangeTabs">
                  <button class="active" data-range="1M" type="button">1M</button>
                  <button data-range="3M" type="button">3M</button>
                  <button data-range="6M" type="button">6M</button>
                  <button data-range="1Y" type="button">1Y</button>
                </div>
              </div>
              <svg id="priceChart" viewBox="0 0 720 360" role="img" aria-label="Price chart" style="display:none"></svg>
              <div id="tvChart"></div>
            </div>

            <div class="detail-grid">
              <section class="detail-section">
                <h3>基本面</h3>
                <div id="fundamentalGrid" class="metric-grid"></div>
              </section>

              <section class="detail-section">
                <h3>价值判断维度</h3>
                <div id="judgmentGrid" class="judgment-grid"></div>
              </section>

              <section class="detail-section wide">
                <h3>视角解释</h3>
                <div id="perspectiveDetail" class="perspective-detail"></div>
              </section>

              <section class="detail-section wide">
                <h3>专家足迹</h3>
                <div id="symbolExpertFootprints" class="symbol-expert-footprints"></div>
              </section>
            </div>
          </section>
        </div>
      </section>

      <section id="expertsView" class="view">
        <div class="expert-workbench">
          <aside class="expert-list-panel">
            <div class="section-head compact">
              <p class="eyebrow">Expert Footprints</p>
              <h2>专家列表</h2>
            </div>
            <div id="expertList" class="expert-list"></div>
          </aside>

          <section class="expert-detail-panel">
            <div class="section-head">
              <p class="eyebrow">Selected Expert</p>
              <h2 id="expertName">选择专家</h2>
              <p id="expertStyle">查看这个专家/机构的投资风格和相关动作。</p>
            </div>
            <div id="expertActions" class="expert-actions"></div>
          </section>
        </div>
      </section>
    </main>

    <script src="app.js?v=20260516-10"></script>
  </body>
</html>
