  * { margin: 0; padding: 0; box-sizing: border-box; }

  #map { width: 100vw; height: 100vh; }

  .info-panel {
    position: fixed; top: 16px; left: 16px;
    background: rgba(10,10,10,0.92); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
    padding: 20px; z-index: 1000; max-width: 300px;

  .info-panel h1 {

  .info-panel .stats { display: flex; gap: 16px; }

  .stat-num { font-size: 24px; font-weight: 700; color: #fc5c7d; }
  .stat-label { font-size: 11px; color: rgba(255,255,255,0.4); }

  .legend {
    position: fixed; bottom: 16px; left: 16px;
    background: rgba(10,10,10,0.92); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
    padding: 12px 16px; z-index: 1000;
    display: flex; flex-wrap: wrap; gap: 6px; max-width: 90vw;
  }
  .legend-item {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: rgba(255,255,255,0.7);
    cursor: pointer; padding: 2px 8px; border-radius: 20px; transition: all 0.2s;
  }
  .legend-item:hover { background: rgba(255,255,255,0.1); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .leaflet-popup-content-wrapper {
    background: rgba(15,15,15,0.95) !important;
    border: 1px solid rgba(255,255,255,0.15) !important;
    border-radius: 12px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;

  .leaflet-popup-tip { background: rgba(15,15,15,0.95) !important; }
  .leaflet-popup-content { margin: 12px 16px !important; }
  .hotel-name { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .hotel-region { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
  .hotel-link {
    display: inline-block; font-size: 12px; color: #fc5c7d; text-decoration: none;
    padding: 4px 12px; border: 1px solid rgba(252,92,125,0.3); border-radius: 20px; transition: all 0.2s;
  }
  .hotel-link:hover { background: rgba(252,92,125,0.15); }
  .no-link { font-size: 11px; color: rgba(255,255,255,0.3); }

  zoom: 5,
  zoomControl: false,
});

// Dark tile layer (no API key needed)

  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Stats
const regions = [...new Set(hotels.map(h => h.region))];
document.getElementById('total-count').textContent = hotels.length;
document.getElementById('region-count').textContent = regions.length;

// Legend
const legendEl = document.getElementById('legend');
regions.forEach(region => {
  const color = regionColors[region] || '#999';
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${color}"></span>${region}`;
  item.onclick = () => {
    const h = hotels.find(h => h.region === region);
    if (h) map.setView([h.lat, h.lng], 8);
  };
  legendEl.appendChild(item);
});

// Markers
hotels.forEach(hotel => {
  const color = regionColors[hotel.region] || '#999';
  
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      width:14px;height:14px;border-radius:50%;
      background:${color};border:2px solid rgba(255,255,255,0.8);
      box-shadow:0 0 10px ${color}80, 0 2px 8px rgba(0,0,0,0.3);
      transition:transform 0.2s;
    "></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
    popupAnchor: [0, -10],
  });

  const tagHtml = hotel.tag ? `<span style="display:inline-block;font-size:10px;color:${color};border:1px solid ${color}40;border-radius:10px;padding:1px 8px;margin-bottom:6px">${hotel.tag}</span> ` : '';
  const linkHtml = hotel.link
    ? `<a href="${hotel.link}" target="_blank" class="hotel-link">携程查看 →</a>`
    : `<span class="no-link"></span>`;

  const marker = L.marker([hotel.lat, hotel.lng], { icon })
    .bindPopup(`
      <div class="hotel-name">${hotel.name}</div>
      <div class="hotel-region">📍 ${hotel.region}</div>
      ${tagHtml}${linkHtml}
    `, { maxWidth: 280 })
    .addTo(map);
